name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        default: 'production'
        type: choice
        options:
        - production
      platform:
        description: 'Deployment platform'
        required: true
        default: 'both'
        type: choice
        options:
        - vercel
        - render
        - both

env:
  NODE_VERSION: '18'

jobs:
  deploy-production-vercel:
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.platform == 'vercel' || github.event.inputs.platform == 'both' || github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Build application
      run: npm run build
    
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
    
    - name: Pull Vercel Environment Information
      run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Build Project Artifacts
      run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Deploy Project Artifacts to Vercel Production
      run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
    
    - name: Create deployment tag
      run: |
        echo "DEPLOYMENT_URL=https://gnoseon-app.vercel.app" >> $GITHUB_ENV
        echo "DEPLOYMENT_PLATFORM=Vercel" >> $GITHUB_ENV
    
    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      if: success()
      with:
        status: success
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        text: '🎉 Production deployment successful to Vercel: ${{ env.DEPLOYMENT_URL }}'

  deploy-production-render:
    runs-on: ubuntu-latest
    environment: production
    if: github.event.inputs.platform == 'render' || github.event.inputs.platform == 'both' || github.event_name == 'release'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Deploy to Render Production
      uses: johnbeynon/render-deploy-action@v0.0.8
      with:
        service-id: ${{ secrets.RENDER_PRODUCTION_SERVICE_ID }}
        api-key: ${{ secrets.RENDER_API_KEY }}
        wait-for-success: true
    
    - name: Create deployment tag
      run: |
        echo "DEPLOYMENT_URL=https://gnoseon-app.onrender.com" >> $GITHUB_ENV
        echo "DEPLOYMENT_PLATFORM=Render" >> $GITHUB_ENV
    
    - name: Notify deployment success
      uses: 8398a7/action-slack@v3
      if: success()
      with:
        status: success
        channel: '#deployments'
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}
        text: '🎉 Production deployment successful to Render: ${{ env.DEPLOYMENT_URL }}'

  health-check:
    runs-on: ubuntu-latest
    needs: [deploy-production-vercel, deploy-production-render]
    if: always() && (needs.deploy-production-vercel.result == 'success' || needs.deploy-production-render.result == 'success')
    
    steps:
    - name: Wait for deployment to be ready
      run: sleep 60
    
    - name: Health check Vercel
      if: needs.deploy-production-vercel.result == 'success'
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" https://gnoseon-app.vercel.app)
        if [ $response -eq 200 ]; then
          echo "✅ Vercel deployment is healthy"
        else
          echo "❌ Vercel deployment health check failed with status $response"
          exit 1
        fi
    
    - name: Health check Render
      if: needs.deploy-production-render.result == 'success'
      run: |
        response=$(curl -s -o /dev/null -w "%{http_code}" https://gnoseon-app.onrender.com)
        if [ $response -eq 200 ]; then
          echo "✅ Render deployment is healthy"
        else
          echo "❌ Render deployment health check failed with status $response"
          exit 1
        fi
